<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebGL Shader Preview — Vanilla JS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #glcanvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .overlay {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .card {
    border: 1px solid rgba(255,255,255,0.15);
    padding: 2.5rem 2rem;
    width: min(90vw, 720px);
    text-align: center;
    backdrop-filter: blur(2px);
    background: rgba(0,0,0,0.15);
  }
  h1 {
    color: #fff;
    font-size: clamp(2rem, 8vw, 4.5rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 0.75rem;
  }
  p {
    color: rgba(255,255,255,0.6);
    font-size: clamp(0.8rem, 1.5vw, 1.05rem);
    margin-bottom: 1.5rem;
  }
  .status {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 1.75rem;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #22c55e;
    position: relative;
  }
  .dot::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: #22c55e;
    opacity: 0.75;
    animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite;
  }
  @keyframes ping {
    75%, 100% { transform: scale(2.4); opacity: 0; }
  }
  .status span { color: #22c55e; font-size: 0.8rem; }
  button {
    pointer-events: auto;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.5);
    color: #fff;
    padding: 0.85rem 2.2rem;
    border-radius: 999px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.15s ease;
  }
  button:hover {
    background: rgba(255,255,255,0.12);
    transform: translateY(-1px);
  }
  .badge {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 3;
    color: rgba(255,255,255,0.4);
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="glcanvas"></canvas>

<div class="overlay">
  <div class="card">
    <h1>Design is Everything</h1>
    <p>Unleashing creativity through bold visuals, seamless interfaces, and limitless possibilities.</p>
    <div class="status">
      <span class="dot"></span>
      <span>Available for New Projects</span>
    </div>
    <div>
      <button onclick="sendPrompt && sendPrompt('Ubah warna shader jadi biru-ungu')">Let's Go</button>
    </div>
  </div>
</div>

<div class="badge">WebGL · Vanilla JS · No Frameworks</div>

<script>
(function () {
  const canvas = document.getElementById('glcanvas');
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');

  if (!gl) {
    document.body.innerHTML = '<p style="color:#fff;padding:2rem">WebGL tidak didukung di browser ini.</p>';
    return;
  }

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- Vertex shader: fullscreen triangle ----
  const vertexSrc = `
    attribute vec2 a_position;
    void main() {
      gl_Position = vec4(a_position, 0.0, 1.0);
    }
  `;

  // ---- Fragment shader: animated wave / plasma distortion ----
  const fragmentSrc = `
    precision highp float;
    uniform vec2 u_resolution;
    uniform float u_time;
    uniform vec2 u_mouse;

    // simple 2D noise
    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453123);
    }
    float noise(vec2 p) {
      vec2 i = floor(p);
      vec2 f = fract(p);
      float a = hash(i);
      float b = hash(i + vec2(1.0, 0.0));
      float c = hash(i + vec2(0.0, 1.0));
      float d = hash(i + vec2(1.0, 1.0));
      vec2 u = f * f * (3.0 - 2.0 * f);
      return mix(a, b, u.x) + (c - a) * u.y * (1.0 - u.x) + (d - b) * u.x * u.y;
    }
    float fbm(vec2 p) {
      float v = 0.0;
      float amp = 0.5;
      for (int i = 0; i < 5; i++) {
        v += amp * noise(p);
        p *= 2.0;
        amp *= 0.5;
      }
      return v;
    }

    void main() {
      vec2 uv = gl_FragCoord.xy / u_resolution.xy;
      vec2 p = uv * 2.0 - 1.0;
      p.x *= u_resolution.x / u_resolution.y;

      float t = u_time * 0.15;

      vec2 mouseInfluence = (u_mouse - 0.5) * 0.6;

      // domain warp for liquid wave feel
      vec2 q = vec2(fbm(p + t + mouseInfluence), fbm(p + vec2(5.2, 1.3) - t));
      vec2 r = vec2(fbm(p + 4.0 * q + vec2(1.7, 9.2) + 0.15 * t),
                     fbm(p + 4.0 * q + vec2(8.3, 2.8) - 0.126 * t));
      float f = fbm(p + 4.0 * r);

      // color palette: deep indigo -> magenta -> warm coral -> cyan
      vec3 col1 = vec3(0.05, 0.02, 0.15);
      vec3 col2 = vec3(0.55, 0.10, 0.65);
      vec3 col3 = vec3(0.95, 0.35, 0.25);
      vec3 col4 = vec3(0.10, 0.55, 0.85);

      vec3 color = mix(col1, col2, clamp(f * f * 2.2, 0.0, 1.0));
      color = mix(color, col3, clamp((r.x + r.y) * 0.5, 0.0, 1.0));
      color = mix(color, col4, clamp(q.y * 0.8, 0.0, 1.0));

      // vignette
      float vig = smoothstep(1.3, 0.2, length(p));
      color *= vig;

      // subtle grain
      float grain = (hash(gl_FragCoord.xy + u_time) - 0.5) * 0.03;
      color += grain;

      gl_FragColor = vec4(color, 1.0);
    }
  `;

  function compileShader(type, src) {
    const shader = gl.createShader(type);
    gl.shaderSource(shader, src);
    gl.compileShader(shader);
    if (!gl.getShaderParameter(shader, gl.COMPILE_STATUS)) {
      console.error(gl.getShaderInfoLog(shader));
    }
    return shader;
  }

  const program = gl.createProgram();
  gl.attachShader(program, compileShader(gl.VERTEX_SHADER, vertexSrc));
  gl.attachShader(program, compileShader(gl.FRAGMENT_SHADER, fragmentSrc));
  gl.linkProgram(program);
  gl.useProgram(program);

  // fullscreen triangle (covers viewport without a quad)
  const positions = new Float32Array([
    -1, -1,
     3, -1,
    -1,  3,
  ]);
  const buffer = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buffer);
  gl.bufferData(gl.ARRAY_BUFFER, positions, gl.STATIC_DRAW);

  const posLoc = gl.getAttribLocation(program, 'a_position');
  gl.enableVertexAttribArray(posLoc);
  gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

  const u_resolution = gl.getUniformLocation(program, 'u_resolution');
  const u_time = gl.getUniformLocation(program, 'u_time');
  const u_mouse = gl.getUniformLocation(program, 'u_mouse');

  let mouseX = 0.5, mouseY = 0.5;
  window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX / window.innerWidth;
    mouseY = 1.0 - e.clientY / window.innerHeight;
  });
  window.addEventListener('touchmove', (e) => {
    if (e.touches[0]) {
      mouseX = e.touches[0].clientX / window.innerWidth;
      mouseY = 1.0 - e.touches[0].clientY / window.innerHeight;
    }
  }, { passive: true });

  const start = performance.now();
  function render() {
    const time = (performance.now() - start) / 1000;
    gl.uniform2f(u_resolution, canvas.width, canvas.height);
    gl.uniform1f(u_time, time);
    gl.uniform2f(u_mouse, mouseX, mouseY);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    requestAnimationFrame(render);
  }
  render();
})();
</script>

</body>
</html>
